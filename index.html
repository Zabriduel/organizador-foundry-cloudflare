<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agente Organizador</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
        :root {
            --blue-50: #E6F1FB; --blue-100: #B5D4F4; --blue-200: #85B7EB;
            --blue-400: #378ADD; --blue-600: #185FA5; --blue-800: #0C447C; --blue-900: #042C53;
            --gray-50: #F1EFE8; --gray-100: #D3D1C7; --gray-600: #5F5E5A;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #EEF3FA; min-height: 100vh;
            display: flex; align-items: flex-start; justify-content: center;
            padding: 1.5rem 1rem;
        }
        #app { width: 100%; max-width: 680px; }

        .top-bar {
            background: #fff; border: 1px solid var(--blue-100);
            border-radius: 16px; padding: 1rem 1.25rem; margin-bottom: .875rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .brand { display: flex; align-items: center; gap: 10px; }
        .brand-icon {
            width: 40px; height: 40px; background: var(--blue-600);
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            font-size: 20px; flex-shrink: 0;
        }
        .brand-text h1 { font-size: 15px; font-weight: 600; color: var(--blue-900); }
        .brand-text p { font-size: 12px; color: var(--blue-600); margin-top: 1px; }

        .status-pill {
            display: flex; align-items: center; gap: 6px;
            background: var(--blue-50); border: 1px solid var(--blue-100);
            border-radius: 20px; padding: 5px 12px; font-size: 12px; color: var(--blue-800);
        }
        .status-dot { width: 7px; height: 7px; background: #22c55e; border-radius: 50%; }

        .chips-row { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: .875rem; }
        .chip {
            background: #fff; border: 1px solid var(--blue-100); border-radius: 20px;
            padding: 6px 14px; font-size: 12px; font-weight: 500; cursor: pointer; color: var(--blue-800);
        }
        .chip:hover { background: var(--blue-50); border-color: var(--blue-200); }

        .chat-card { background: #fff; border: 1px solid var(--blue-100); border-radius: 16px; overflow: hidden; }
        .chat-header { background: var(--blue-600); padding: .75rem 1.25rem; display: flex; align-items: center; gap: 8px; }
        .chat-header span { font-size: 13px; font-weight: 500; color: #fff; }
        .chat-header-dots { margin-left: auto; display: flex; gap: 5px; }
        .chat-header-dots span { width: 8px; height: 8px; border-radius: 50%; background: rgba(255, 255, 255, .35); }

        .chat-messages {
            padding: 1rem; min-height: 280px; max-height: 400px;
            overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #F4F8FD;
        }
        .msg { max-width: 78%; display: flex; gap: 8px; align-items: flex-end; }
        .msg.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg.system { align-self: center; max-width: 100%; }
        .msg-avatar {
            width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600;
        }
        .msg.agent .msg-avatar { background: var(--blue-600); color: #fff; }
        .msg.user .msg-avatar { background: var(--blue-100); color: var(--blue-800); }
        .msg-bubble { padding: 9px 13px; border-radius: 14px; font-size: 13.5px; line-height: 1.55; }
        .msg.agent .msg-bubble { background: #fff; color: var(--blue-900); border: 1px solid var(--blue-100); border-bottom-left-radius: 4px; }
        .msg.user .msg-bubble { background: var(--blue-600); color: #fff; border-bottom-right-radius: 4px; }
        .msg.system .msg-bubble { background: none; border: none; color: var(--gray-600); font-size: 11.5px; text-align: center; }

        .input-area { padding: .875rem 1rem; border-top: 1px solid var(--blue-50); background: #fff; display: flex; gap: 8px; align-items: center; }
        #user-input {
            flex: 1; padding: 9px 14px; font-size: 13.5px; border: 1px solid var(--blue-100);
            border-radius: 24px; background: var(--blue-50); color: var(--blue-900); outline: none; font-family: inherit;
        }
        #user-input:focus { border-color: var(--blue-400); background: #fff; }
        #user-input::placeholder { color: var(--blue-200); }
        #send-btn {
            width: 38px; height: 38px; border-radius: 50%; background: var(--blue-600);
            border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px; flex-shrink: 0;
        }
        #send-btn:hover { background: var(--blue-800); }
        #send-btn:disabled { opacity: .4; cursor: default; }
    </style>
</head>
<body>
    <div id="app">
        <div class="top-bar">
            <div class="brand">
                <div class="brand-icon">📋</div>
                <div class="brand-text">
                    <h1>Agente Organizador</h1>
                    <p>Azure AI Foundry · zabriduel</p>
                </div>
            </div>
            <div class="top-right">
                <div class="status-pill"><span class="status-dot"></span> online</div>
            </div>
        </div>

        <div class="chips-row">
            <div class="chip" onclick="sendChip('Organizar meu dia')">📅 Organizar meu dia</div>
            <div class="chip" onclick="sendChip('Criar uma lista de tarefas')">✅ Lista de tarefas</div>
            <div class="chip" onclick="sendChip('Me ajude a definir prioridades')">🎯 Definir prioridades</div>
            <div class="chip" onclick="sendChip('O que você pode fazer por mim?')">💡 O que você faz?</div>
        </div>

        <div class="chat-card">
            <div class="chat-header">
                <span>🤖 Organizador</span>
                <div class="chat-header-dots"><span></span><span></span><span></span></div>
            </div>
            <div class="chat-messages" id="chat-box">
                <div class="msg agent">
                    <div class="msg-avatar">IA</div>
                    <div class="msg-bubble">Olá! Sou o Agente Organizador. Como posso ajudar a estruturar seu dia hoje?</div>
                </div>
            </div>
            <div class="input-area">
                <input id="user-input" placeholder="Digite sua mensagem..." onkeydown="if(event.key==='Enter')sendMsg()" />
                <button id="send-btn" onclick="sendMsg()" aria-label="Enviar">➤</button>
            </div>
        </div>
    </div>

    <script>
        // COLOQUE AQUI A URL QUE O CLOUDFLARE GEROU PARA VOCÊ
        const FUNCTION_URL = "https://flat-art-43c7.gabriel31alves.workers.dev/";

        function addMsg(text, role) {
            const box = document.getElementById("chat-box");
            const wrap = document.createElement("div");
            wrap.className = "msg " + role;
            if (role === "system") {
                wrap.innerHTML = '<div class="msg-bubble">' + text + '</div>';
            } else {
                const label = role === "agent" ? "IA" : "Eu";
                wrap.innerHTML = '<div class="msg-avatar">' + label + '</div><div class="msg-bubble">' + text.replace(/\n/g, '<br>') + '</div>';
            }
            box.appendChild(wrap);
            box.scrollTop = box.scrollHeight;
            return wrap;
        }

        function sendChip(text) {
            document.getElementById("user-input").value = text;
            sendMsg();
        }

        async function sendMsg() {
            const input = document.getElementById("user-input");
            const btn = document.getElementById("send-btn");
            const text = input.value.trim();
            if (!text) return;

            addMsg(text, "user");
            input.value = "";
            btn.disabled = true;
            const typing = addMsg("digitando...", "system");

            try {
                const res = await fetch(FUNCTION_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text: text })
                });
                
                const data = await res.json();
                typing.remove();
                
                if (!res.ok || data.error) { 
                    addMsg("❌ Erro: " + (data.error?.message || data.error || "Falha na comunicação com o servidor."), "system"); 
                    return; 
                }
                
                const reply = data.output_text || (data.output && data.output[0] && data.output[0].content && data.output[0].content[0] && data.output[0].content[0].text) || "Resposta não compreendida.";
                addMsg(reply, "agent");
                
            } catch (err) {
                typing.remove();
                addMsg("❌ Erro de conexão com o proxy do Cloudflare.", "system");
            } finally {
                btn.disabled = false;
                input.focus();
            }
        }
    </script>
</body>
</html>
